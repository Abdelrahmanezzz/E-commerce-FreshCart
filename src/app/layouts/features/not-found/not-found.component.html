<section class="flex min-h-screen items-center justify-center bg-gray-50 px-6 py-16">
  <div class="mx-auto max-w-lg text-center">
    <!-- 404 Number -->
    <div class="relative mb-8 select-none">
      <p class="text-[10rem] font-black leading-none text-gray-100 md:text-[14rem]">404</p>
      <div class="absolute inset-0 flex items-center justify-center">
        <div
          class="flex h-24 w-24 items-center justify-center rounded-full bg-emerald-50 shadow-inner"
        >
          <i class="fa-solid fa-map-location-dot text-4xl text-emerald-500"></i>
        </div>
      </div>
    </div>

    <!-- Text -->
    <h1 class="mb-4 text-3xl font-bold text-slate-800 md:text-4xl">Page Not Found</h1>

    <p class="mb-10 text-lg leading-relaxed text-gray-500">
      Oops! The page you're looking for doesn't exist or has been moved.
      <br class="hidden sm:block" />
      Let's get you back on track.
    </p>

    <!-- Actions -->
    <div class="flex flex-col items-center justify-center gap-4 sm:flex-row">
      <a
        routerLink="/home"
        class="inline-flex items-center justify-center gap-2 rounded-full bg-emerald-600 px-8 py-3.5 font-semibold text-white shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:bg-emerald-700 hover:shadow-md focus:outline-none focus:ring-4 focus:ring-emerald-100"
      >
        <i class="fa-solid fa-house"></i>
        Back to Home
      </a>

      <a
        routerLink="/shop"
        class="inline-flex items-center justify-center gap-2 rounded-full border border-gray-200 bg-white px-8 py-3.5 font-semibold text-gray-700 shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:border-emerald-300 hover:text-emerald-600 hover:shadow-md focus:outline-none focus:ring-4 focus:ring-emerald-100"
      >
        <i class="fa-solid fa-store"></i>
        Browse Shop
      </a>
    </div>

    <!-- Quick Links -->
    <div class="mt-12 border-t border-gray-200 pt-8">
      <p class="mb-4 text-sm font-medium text-gray-500">You might be looking for:</p>
      <div class="flex flex-wrap items-center justify-center gap-3">
        <a
          routerLink="/categories"
          class="rounded-full border border-gray-200 bg-white px-4 py-2 text-sm text-gray-600 transition-colors hover:border-emerald-300 hover:text-emerald-600"
        >
          Categories
        </a>
        <a
          routerLink="/brands"
          class="rounded-full border border-gray-200 bg-white px-4 py-2 text-sm text-gray-600 transition-colors hover:border-emerald-300 hover:text-emerald-600"
        >
          Brands
        </a>
        <a
          routerLink="/cart"
          class="rounded-full border border-gray-200 bg-white px-4 py-2 text-sm text-gray-600 transition-colors hover:border-emerald-300 hover:text-emerald-600"
        >
          Cart
        </a>
        <a
          routerLink="/wishlist"
          class="rounded-full border border-gray-200 bg-white px-4 py-2 text-sm text-gray-600 transition-colors hover:border-emerald-300 hover:text-emerald-600"
        >
          Wishlist
        </a>
        <a
          routerLink="/login"
          class="rounded-full border border-gray-200 bg-white px-4 py-2 text-sm text-gray-600 transition-colors hover:border-emerald-300 hover:text-emerald-600"
        >
          Sign In
        </a>
      </div>
    </div>
  </div>
</section>
